<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circular glow -->
  <circle cx="256" cy="256" r="230" fill="#14151b" stroke="#2e303a" stroke-width="8" />
  
  <g filter="url(#glow)">
    <!-- Clipboard Board -->
    <rect x="156" y="136" width="200" height="260" rx="24" fill="url(#purpleGrad)" opacity="0.9" />
    <!-- Sheet of paper -->
    <rect x="176" y="176" width="160" height="190" rx="12" fill="#ffffff" />
    <!-- Clipboard Clip -->
    <path d="M226,116 L286,116 C296,116 301,121 301,131 L301,146 L211,146 L211,131 C211,121 216,116 226,116 Z" fill="#0b0c10" />
    <!-- Paper lines -->
    <line x1="206" y1="216" x2="306" y2="216" stroke="#2e303a" stroke-width="8" stroke-linecap="round" />
    <line x1="206" y1="256" x2="306" y2="256" stroke="#2e303a" stroke-width="8" stroke-linecap="round" />
    <line x1="206" y1="296" x2="276" y2="296" stroke="#2e303a" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
